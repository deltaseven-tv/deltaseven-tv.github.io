<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinas Ketahanan Pangan Provinsi Sumatera Utara</title>

    <style>
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #f5f5f5; color: #333; padding-bottom: 60px; }

        /* HEADER */
        .header {
            display: flex; gap: 20px; align-items: center;
            padding: 20px; background: #fff; border-bottom: 4px solid #1b5e20;
        }
        .header img { height: 80px; }
        .header h1 { margin: 0; font-size: 18px; color: #1b5e20; text-transform: uppercase; line-height: 1.2; }
        .header h2 { margin: 0; font-size: 14px; color: #555; }

        /* LAYOUT */
        .wrapper {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .box {
            background: #fff; border-radius: 8px;
            box-shadow: 0 4px 12px rgba(0,0,0,.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .box h3 { margin: 0; padding: 15px; background: #4caf50; color: #fff; font-size: 16px; }

        /* SLIDE */
        #slide {
            height: 450px;
            background: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .slide-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            animation: fade 1s ease-in-out;
        }

        @keyframes fade {
            from { opacity: 0.4; }
            to { opacity: 1; }
        }

        /* VIDEO */
        #video {
            height: 450px;
            background: #000;
            position: relative;
        }

        /* RUNNING TEXT */
        .footer-marquee {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #ffd700;
            color: #1b5e20;
            padding: 10px 0;
            font-weight: bold;
            font-size: 1.1rem;
            border-top: 2px solid #1b5e20;
            z-index: 1000;
        }

        marquee { display: block; }

        /* RESPONSIVE */
        @media(max-width:900px){
            .wrapper { grid-template-columns: 1fr; padding: 10px; }
            #slide, #video { height: 300px; }
        }
    </style>

    <script src="https://www.youtube.com/iframe_api"></script>
</head>

<body>

<div class="header">
    <img src="https://upload.wikimedia.org/wikipedia/commons/d/db/LOGO-PROVINSI-SUMATERA-UTARA.png" alt="Logo Sumut">
    <div>
        <h1>Dinas Ketahanan Pangan, Tanaman Pangan dan Hortikultura</h1>
        <h2>Provinsi Sumatera Utara</h2>
    </div>
</div>

<div class="wrapper">
    <div class="box">
        <h3>Galeri Kegiatan</h3>
        <div id="slide">Memuat foto...</div>
    </div>

    <div class="box">
        <h3>Video Profil / Kegiatan</h3>
        <div id="video"></div>
    </div>
</div>

<div class="footer-marquee">
    <marquee id="runningText">Memuat informasi dinas...</marquee>
</div>

<script>
    let slides = [], slideIndex = 0;
    let videos = [], videoIndex = 0;
    let player;
    let ytReady = false;

    // 1. YouTube API Callback
    function onYouTubeIframeAPIReady() {
        ytReady = true;
        console.log("YouTube API Ready");
    }

    function getYoutubeId(url) {
        if (url.includes('youtu.be/')) return url.split('youtu.be/')[1].split('?')[0];
        if (url.includes('watch?v=')) return url.split('watch?v=')[1].split('&')[0];
        return '';
    }

    // 2. Slideshow Function
    function startSlideshow() {
        if (!slides.length) return;
        const container = document.getElementById('slide');
        const imgPath = slides[slideIndex].startsWith('http') ? slides[slideIndex] : slides[slideIndex];
        
        container.innerHTML = `<img class="slide-img" src="${imgPath}" onerror="this.src='https://via.placeholder.com/800x450?text=Gambar+Tidak+Ditemukan'">`;
        
        slideIndex = (slideIndex + 1) % slides.length;
        setTimeout(startSlideshow, 5000);
    }

    // 3. Video Playback Function
    function playVideo() {
        const area = document.getElementById('video');
        if (!videos.length) {
            area.innerHTML = "<div style='color:#fff;padding:20px'>Belum ada video.</div>";
            return;
        }

        const v = videos[videoIndex];

        if (v.includes('youtu')) {
            if (!ytReady) {
                setTimeout(playVideo, 1000);
                return;
            }
            area.innerHTML = `<div id="ytplayer"></div>`;
            player = new YT.Player('ytplayer', {
                width: '100%',
                height: '100%',
                videoId: getYoutubeId(v),
                playerVars: { 
                    'autoplay': 1, 
                    'mute': 1, // Wajib mute agar autoplay jalan di Chrome/Edge
                    'rel': 0, 
                    'controls': 1 
                },
                events: {
                    'onReady': (e) => e.target.playVideo(),
                    'onStateChange': (e) => {
                        if (e.data === YT.PlayerState.ENDED) {
                            videoIndex = (videoIndex + 1) % videos.length;
                            playVideo();
                        }
                    }
                }
            });
        } else {
            // Untuk file video lokal (MP4)
            area.innerHTML = `<video id="v-local" autoplay muted controls style="width:100%;height:100%"><source src="${v}" type="video/mp4"></video>`;
            const vid = document.getElementById('v-local');
            vid.onended = () => {
                videoIndex = (videoIndex + 1) % videos.length;
                playVideo();
            };
        }
    }

    // 4. Fetch data.json
    // Pastikan file ini bernama data.json (huruf kecil) dan sejajar dengan index.html
    fetch('data.json')
        .then(res => {
            if(!res.ok) throw new Error("Gagal load data.json");
            return res.json();
        })
        .then(data => {
            // Set Running Text
            document.getElementById('runningText').innerText = data.runningText || "Selamat Datang di Dinas Pertanian";

            // Set Slideshow
            if (data.slideshow && data.slideshow.length > 0) {
                slides = data.slideshow;
                startSlideshow();
            }

            // Set Video
            if (data.videoList && data.videoList.length > 0) {
                videos = data.videoList;
                playVideo();
            }
        })
        .catch(err => {
            console.error(err);
            document.getElementById('runningText').innerText = "Gagal memuat data.json. Pastikan file sudah diunggah.";
        });
</script>

</body>
</html>
