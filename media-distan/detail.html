<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Detail Informasi - Dinas TPH Provsu</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f4f4; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { background: white; padding: 15px; border-bottom: 4px solid #1b5e20; display: flex; align-items: center; gap: 20px; }
        nav { background: #1b5e20; padding: 10px; color: white; }
        
        .main-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-top: 20px; }
        .article-card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* Gaya Slideshow & Video (Mirip Web Depan) */
        .detail-slide { width: 100%; height: 350px; background: #000; border-radius: 8px; overflow: hidden; margin-bottom: 20px; }
        .detail-slide img { width: 100%; height: 100%; object-fit: cover; }
        .video-box { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        iframe { width: 100%; border-radius: 4px; border: none; height: 200px; }
        
        footer { background: #1b5e20; color: white; text-align: center; padding: 20px; margin-top: 40px; }
    </style>
</head>
<body>

    <header>
        <img src="https://upload.wikimedia.org/wikipedia/commons/d/db/LOGO-PROVINSI-SUMATERA-UTARA.png" height="50">
        <div>
            <h2 style="margin:0; font-size: 1.1rem; color: #1b5e20;">DINAS TPH PROVINSI SUMATERA UTARA</h2>
        </div>
    </header>

    <nav><div class="container"><a href="/" style="color:white; text-decoration:none;">🏠 Beranda</a></div></nav>

    <div class="container">
        <div class="main-grid">
            <div>
                <div class="article-card">
                    <h1 id="title" style="color:#1b5e20; margin-top:0;"></h1>
                    
                    <div id="slide-area" class="detail-slide" style="display:none;">
                        <img id="current-img" src="">
                    </div>

                    <div id="konten" style="line-height:1.8; color:#444;"></div>
                </div>
            </div>

            <div>
                <div class="video-box">
                    <h3 style="margin-top:0; color:#1b5e20; border-bottom:2px solid #ffd700;">Galeri Video</h3>
                    <div id="video-area"></div>
                </div>
            </div>
        </div>
    </div>

    <footer>&copy; 2026 Dinas TPH Provsu</footer>

    <script>
        async function loadData() {
            const params = new URLSearchParams(window.location.search);
            const pageId = params.get('page');
            
            try {
                const res = await fetch('/api/data');
                const data = await res.json();
                const pageData = data.menuAtas.find(m => m.link.includes(pageId));

                if(pageData) {
                    document.getElementById('title').innerText = pageData.nama;
                    document.getElementById('konten').innerHTML = pageData.konten;

                    // Logika Foto
                    if(pageData.galeriFoto && pageData.galeriFoto.length > 0) {
                        document.getElementById('slide-area').style.display = 'block';
                        document.getElementById('current-img').src = pageData.galeriFoto[0];
                    }

                    // Logika Video
                    const vArea = document.getElementById('video-area');
                    if(pageData.galeriVideo && pageData.galeriVideo.length > 0) {
                        vArea.innerHTML = pageData.galeriVideo.map(v => `
                            <iframe src="https://www.youtube.com/embed/${v}"></iframe>
                        `).join('');
                    } else {
                        vArea.innerHTML = "<p style='color:#999'>Belum ada video.</p>";
                    }
                }
            } catch(e) { console.error(e); }
        }
        window.onload = loadData;
    </script>
</body>
</html>
